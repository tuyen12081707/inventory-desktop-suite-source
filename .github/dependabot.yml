version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '02:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      npm-development:
        dependency-type: development
      npm-production:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '02:30'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
