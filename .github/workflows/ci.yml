name: CI

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main', 'develop']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: inventory_ci
          POSTGRES_USER: inventory
          POSTGRES_PASSWORD: inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U inventory -d inventory_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://inventory:inventory@localhost:5432/inventory_ci?schema=public
      JWT_ACCESS_SECRET: ci-only-secret-with-at-least-32-characters
      JWT_ACCESS_TTL: 15m
      REFRESH_TOKEN_TTL_DAYS: 30
      CORS_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Validate migrations and seed
        run: |
          npm run db:deploy
          npm run db:seed

      - name: Build all workspaces
        run: npm run build
