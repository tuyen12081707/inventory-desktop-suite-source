name: Web App

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared contracts
        run: npm run build -w @inventory/contracts

      - name: Build web application
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://inventory-pro-api-tuyen12081707.onrender.com/api/v1' }}
        run: npm run build:renderer -w @inventory/desktop

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/desktop/dist/renderer

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
